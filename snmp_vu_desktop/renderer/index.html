<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SNMP VU Monitor</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="app-shell">
  <div id="mainView" class="main-view">
    <div class="toolbar">
      <div>
        <div class="eyebrow">PalWeb Local SNMP Gadget</div>
        <h1>5 VU Analogicos <span id="buildBadge" class="build-badge">build -</span></h1>
        <div id="updateBanner" class="update-banner">Version local</div>
      </div>
      <div class="toolbar-actions">
        <button class="gear-btn" id="checkUpdateBtn" title="Buscar actualizacion">⟳</button>
        <button class="gear-btn" id="openConfigBtn" title="Configuracion">⚙</button>
      </div>
    </div>
    <div class="debug-panel" id="debugPanel">
      <div class="debug-head">
        <strong>Debug</strong>
        <button class="debug-btn" id="selfTestBtn" type="button">Self test</button>
      </div>
      <div class="debug-grid">
        <div>API:</div><div id="dbgApi">-</div>
        <div>Config btn:</div><div id="dbgConfigBtn">-</div>
        <div>Update btn:</div><div id="dbgUpdateBtn">-</div>
        <div>Ult. poll:</div><div id="dbgPoll">-</div>
      </div>
      <pre id="debugLog" class="debug-log">Inicializando...</pre>
    </div>
    <div id="gauges" class="gauges"></div>
  </div>
  <script src="app.js"></script>
</body>
</html>
