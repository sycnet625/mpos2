<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Configuracion</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="config-shell">
  <div class="config-window">
    <div class="config-header">
      <div>
        <div class="eyebrow">Configuracion local</div>
        <h2>SNMP VU Monitor</h2>
      </div>
      <div class="config-actions">
        <select id="themeSelect" class="select-input medium-input">
          <option value="blue_ice">Tema Azul</option>
          <option value="amber_lab">Tema Ambar</option>
          <option value="green_radar">Tema Verde</option>
        </select>
        <select id="dockModeSelect" class="select-input medium-input">
          <option value="none">Dock libre</option>
          <option value="left">Dock izquierda</option>
          <option value="right">Dock derecha</option>
        </select>
        <div class="opacity-box">
          <label class="field-label inline-label" for="windowOpacityRange">Transparencia</label>
          <input id="windowOpacityRange" type="range" min="45" max="100" step="5" value="100">
          <span id="windowOpacityValue">100%</span>
        </div>
        <label class="switch-line tray-switch">
          <input id="trayEnabled" type="checkbox" checked>
          <span class="field-label inline-label">Mostrar icono en bandeja</span>
        </label>
        <input id="refreshMs" type="number" min="1000" step="500" class="text-input small-input">
        <button id="importConfigBtn" class="secondary-btn">Importar</button>
        <button id="exportConfigBtn" class="secondary-btn">Exportar</button>
        <button id="saveConfigBtn" class="primary-btn">Guardar</button>
      </div>
    </div>
    <div class="profiles-bar">
      <input id="profileNameInput" class="text-input profile-name-input" placeholder="Nombre del perfil">
      <button id="saveProfileBtn" class="secondary-btn">Guardar perfil</button>
      <select id="savedProfilesSelect" class="select-input profile-select">
        <option value="">Perfiles guardados</option>
      </select>
      <button id="loadProfileBtn" class="secondary-btn">Cargar</button>
      <button id="deleteProfileBtn" class="secondary-btn danger-btn">Eliminar</button>
    </div>
    <div id="configGrid" class="config-grid"></div>
    <div class="walk-panel">
      <div class="walk-title">SNMP walk</div>
      <pre id="walkOutput">Sin ejecutar.</pre>
    </div>
    <div class="debug-panel" id="debugPanel">
      <div class="debug-head">
        <strong>Debug</strong>
        <button class="debug-btn" id="selfTestBtn" type="button">Self test</button>
      </div>
      <div class="debug-grid">
        <div>API:</div><div id="dbgApi">-</div>
        <div>Config btn:</div><div id="dbgConfigBtn">-</div>
        <div>Update btn:</div><div id="dbgUpdateBtn">-</div>
        <div>Ult. poll:</div><div id="dbgPoll">-</div>
      </div>
      <pre id="debugLog" class="debug-log">Inicializando...</pre>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
