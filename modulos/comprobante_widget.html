<!-- Widget de Comprobante de Ventas - Se incluye en POS -->
<div class="card shadow-sm mb-3" style="border-left: 4px solid #17a2b8;">
    <div class="card-body p-3">
        <div class="d-flex justify-content-between align-items-center">
            <div>
                <h6 class="card-title mb-1">
                    <i class="fas fa-receipt text-info me-2"></i>Comprobante de Ventas
                </h6>
                <p class="card-text small text-muted mb-0">
                    Genera comprobantes profesionales en HTML/PDF
                </p>
            </div>
            <button class="btn btn-sm btn-outline-info" onclick="abrirComprobante()">
                <i class="fas fa-file-invoice me-1"></i>Generar
            </button>
        </div>
    </div>
</div>

<script>
function abrirComprobante() {
    const idVenta = prompt('Ingresa el ID de la venta para generar el comprobante:');
    if (idVenta && idVenta.trim() !== '') {
        window.open('comprobante_ventas.php?id=' + encodeURIComponent(idVenta), '_blank', 'width=1000,height=800');
    }
}

// Si estamos en la página de ver detalles de una venta, permitir generar comprobante rápidamente
function generarComprobanteDesdeVenta(idVenta) {
    window.open('comprobante_ventas.php?id=' + idVenta, '_blank', 'width=1000,height=800');
}
</script>
