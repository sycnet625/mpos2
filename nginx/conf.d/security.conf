# ============================================================
# Zonas de rate limiting — PalWeb
# ============================================================

# Zona para páginas de autenticación (login admin + PIN cajeros)
# 20 req/min por IP, memoria de 10 MB (~160.000 IPs)
limit_req_zone $binary_remote_addr zone=auth_login:10m rate=20r/m;

# Respuesta cuando se excede el límite: 429 Too Many Requests
limit_req_status 429;
