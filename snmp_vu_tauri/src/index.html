<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PalWeb SNMP VU Tauri</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="app-shell">
  <div id="mainView" class="main-view">
    <div class="toolbar">
      <div class="toolbar-actions">
        <div class="drag-handle" data-tauri-drag-region title="Mover ventana">⠿</div>
        <button class="gear-btn" id="closeAppBtn" title="Cerrar aplicacion">✕</button>
        <button class="gear-btn" id="openConfigBtn" title="Configuracion">⚙</button>
        <button class="gear-btn" id="refreshBtn" title="Refrescar">⟳</button>
      </div>
      <div class="toolbar-info">
        <div class="eyebrow">PalWeb Local SNMP Gadget Tauri</div>
        <h1>5 VU Analogicos <span id="buildBadge" class="build-badge">build -</span></h1>
        <div id="updateBanner" class="update-banner">MVP Tauri local</div>
      </div>
    </div>
    <div id="inlineConfig" class="inline-config hidden">
      <div class="inline-config-head">
        <strong>Configuracion</strong>
        <button class="secondary-btn compact-btn" id="saveConfigBtn" type="button">Guardar</button>
      </div>
      <div id="configStatus" class="config-status compact-status">Lista</div>
      <div class="compact-global">
        <label class="mini-field">
          <span>ms</span>
          <input id="refreshMs" class="text-input tiny-input" type="number" min="1000" step="500">
        </label>
        <label class="mini-field">
          <span>Tema</span>
          <select id="themeSelect" class="select-input tiny-select">
            <option value="blue_ice">Azul</option>
            <option value="amber_lab">Ambar</option>
            <option value="green_radar">Verde</option>
          </select>
        </label>
        <label class="mini-field">
          <span>%</span>
          <input id="windowOpacityRange" type="range" min="45" max="100" step="5" value="100">
          <em id="windowOpacityValue">100%</em>
        </label>
        <label class="mini-field">
          <span>Ancho</span>
          <input id="mainWidthRange" type="range" min="140" max="420" step="4" value="192">
          <em id="mainWidthValue">192px</em>
        </label>
        <label class="mini-field">
          <span>Dock</span>
          <select id="dockMode" class="select-input tiny-select">
            <option value="free">Libre</option>
            <option value="left">Izquierda</option>
            <option value="right">Derecha</option>
          </select>
        </label>
      </div>
      <div id="configGrid" class="compact-grid"></div>
    </div>
    <div id="gauges" class="gauges"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
